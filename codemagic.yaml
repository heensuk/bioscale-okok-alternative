workflows:
  ios-unsigned:
    name: iOS Unsigned (SideStore)
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: mobile
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Build iOS sem assinatura
        script: flutter build ios --release --no-codesign
      - name: Empacotar .ipa
        script: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/Runner.app
          zip -r0 app-unsigned.ipa Payload
    artifacts:
      - mobile/build/ios/iphoneos/*.ipa
